<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票技术指标回测分析平台</title>
    <!-- 引入Tailwind CSS（简化样式开发） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入ECharts（图表可视化） -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 引入Day.js（日期处理） -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <!-- Tailwind自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#6B7280',
                        success: '#00B42A',
                        danger: '#F53F3F',
                        warning: '#FF7D00'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.08);
            }
            .loading-spinner {
                border-top-color: theme('colors.primary');
                animation: spinner 0.8s linear infinite;
            }
            @keyframes spinner {
                to { transform: rotate(360deg); }
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <!-- 顶部导航 -->
    <header class="bg-white card-shadow sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-[clamp(1.25rem,2vw,1.75rem)] font-bold text-primary">
                股票技术指标回测分析平台
            </h1>
            <div class="text-sm text-secondary">
                基于8类经典技术指标 | 全市场A股支持
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- 1. 参数选择区域 -->
        <section class="bg-white rounded-lg card-shadow p-6 mb-8">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">回测参数设置</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 股票代码输入 -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">股票代码</label>
                    <input
                        type="text"
                        id="stockCode"
                        placeholder="例如：603298（杭叉集团）、000039（中集集团）"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
                        value="603298"
                    >
                    <p class="text-xs text-secondary">支持沪深A股代码，如60开头、00开头、30开头</p>
                </div>

                <!-- 时间区间选择 -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">回测时间区间</label>
                    <div class="space-y-2">
                        <div class="flex items-center space-x-2">
                            <input type="radio" name="timeRange" id="range1Y" class="accent-primary" checked>
                            <label for="range1Y" class="text-sm">过去1年</label>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="radio" name="timeRange" id="range3Y" class="accent-primary">
                            <label for="range3Y" class="text-sm">过去3年</label>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="radio" name="timeRange" id="rangeCustom" class="accent-primary">
                            <label for="rangeCustom" class="text-sm">自定义</label>
                        </div>
                    </div>
                    <!-- 自定义日期选择器（默认隐藏） -->
                    <div id="customDateContainer" class="hidden mt-2 flex space-x-2">
                        <input
                            type="date"
                            id="startDate"
                            class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
                        >
                        <span class="flex items-center text-gray-400">至</span>
                        <input
                            type="date"
                            id="endDate"
                            class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
                        >
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="flex items-end">
                    <button
                        id="startBacktest"
                        class="w-full bg-primary text-white py-2 px-4 rounded-md hover:bg-primary/90 transition-colors flex items-center justify-center gap-2"
                    >
                        <span>开始研究</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- 2. 加载状态（默认隐藏） -->
        <section id="loadingSection" class="hidden bg-white rounded-lg card-shadow p-6 mb-8 flex items-center justify-center">
            <div class="loading-spinner w-8 h-8 border-4 border-gray-200 rounded-full"></div>
            <p class="ml-4 text-primary">正在执行回测分析，请稍候...</p>
        </section>

        <!-- 3. 结果展示区域（默认隐藏） -->
        <section id="resultSection" class="hidden space-y-8">
            <!-- 3.1 组合价值走势图表 -->
            <div class="bg-white rounded-lg card-shadow p-6">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">组合价值走势（对比基准）</h2>
                <div id="portfolioChart" class="w-full h-[400px]"></div>
            </div>

            <!-- 3.2 策略收益/回撤对比 -->
            <div class="bg-white rounded-lg card-shadow p-6">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">策略收益与回撤对比</h2>
                <div id="returnDrawdownChart" class="w-full h-[400px]"></div>
            </div>

            <!-- 3.3 回测详情表格 -->
            <div class="bg-white rounded-lg card-shadow p-6 overflow-x-auto">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">回测结果详情</h2>
                <table class="w-full min-w-[800px] border-collapse">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="border border-gray-200 px-4 py-2 text-left text-sm font-medium">策略名称</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">累计收益(%)</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">年化收益(%)</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">最大回撤(%)</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">夏普比率</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">胜率(%)</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">交易次数</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">盈亏比</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">超额收益(%)</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody">
                        <!-- 表格内容由JS动态填充 -->
                    </tbody>
                </table>
            </div>

            <!-- 3.4 最优策略交易明细 -->
            <div class="bg-white rounded-lg card-shadow p-6 overflow-x-auto">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2" id="bestStrategyTitle">最优策略交易明细</h2>
                <table class="w-full min-w-[600px] border-collapse">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="border border-gray-200 px-4 py-2 text-left text-sm font-medium">序号</th>
                            <th class="border border-gray-200 px-4 py-2 text-left text-sm font-medium">买入日期</th>
                            <th class="border border-gray-200 px-4 py-2 text-left text-sm font-medium">卖出日期</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">买入价</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">卖出价</th>
                            <th class="border border-gray-200 px-4 py-2 text-right text-sm font-medium">盈亏(%)</th>
                        </tr>
                    </thead>
                    <tbody id="tradeDetailTableBody">
                        <!-- 交易明细由JS动态填充 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 底部版权 -->
    <footer class="bg-white card-shadow mt-12 py-6">
        <div class="container mx-auto px-4 text-center text-secondary text-sm">
            © 2025 股票技术指标回测分析平台 | 数据来源：akshare | 仅用于研究目的，不构成投资建议
        </div>
    </footer>

    <script>
        // ========== 初始化变量 ==========
        const stockCodeInput = document.getElementById('stockCode');
        const range1Y = document.getElementById('range1Y');
        const range3Y = document.getElementById('range3Y');
        const rangeCustom = document.getElementById('rangeCustom');
        const customDateContainer = document.getElementById('customDateContainer');
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const startBacktestBtn = document.getElementById('startBacktest');
        const loadingSection = document.getElementById('loadingSection');
        const resultSection = document.getElementById('resultSection');

        // 初始化日期（默认当前日期）
        const today = dayjs();
        endDateInput.value = today.format('YYYY-MM-DD');
        startDateInput.value = today.subtract(1, 'year').format('YYYY-MM-DD');

        // ========== 事件监听 ==========
        // 时间区间选择切换
        [range1Y, range3Y, rangeCustom].forEach(radio => {
            radio.addEventListener('change', () => {
                if (radio.id === 'rangeCustom') {
                    customDateContainer.classList.remove('hidden');
                } else {
                    customDateContainer.classList.add('hidden');
                    // 自动计算对应日期
                    let endDate = today;
                    let startDate;
                    if (radio.id === 'range1Y') {
                        startDate = endDate.subtract(1, 'year');
                    } else if (radio.id === 'range3Y') {
                        startDate = endDate.subtract(3, 'year');
                    }
                    startDateInput.value = startDate.format('YYYY-MM-DD');
                    endDateInput.value = endDate.format('YYYY-MM-DD');
                }
            });
        });

        // 开始回测按钮点击
        startBacktestBtn.addEventListener('click', async () => {
            // 1. 验证输入
            const stockCode = stockCodeInput.value.trim();
            if (!stockCode) {
                alert('请输入股票代码！');
                return;
            }

            // 2. 获取时间区间
            let startDate, endDate;
            if (range1Y.checked) {
                endDate = today;
                startDate = endDate.subtract(1, 'year');
            } else if (range3Y.checked) {
                endDate = today;
                startDate = endDate.subtract(3, 'year');
            } else {
                startDate = dayjs(startDateInput.value);
                endDate = dayjs(endDateInput.value);
                if (!startDate.isValid() || !endDate.isValid()) {
                    alert('请选择有效的自定义日期！');
                    return;
                }
                if (startDate >= endDate) {
                    alert('开始日期不能晚于结束日期！');
                    return;
                }
            }

            // 3. 转换为Python需要的格式（YYYYMMDD）
            const startDateStr = startDate.format('YYYYMMDD');
            const endDateStr = endDate.format('YYYYMMDD');

            // 4. 显示加载状态，隐藏结果
            loadingSection.classList.remove('hidden');
            resultSection.classList.add('hidden');

            try {
                // 5. 调用后端接口（替换为你的实际后端地址）
                const response = await fetch('/api/backtest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        stock_code: stockCode,
                        start_date: startDateStr,
                        end_date: endDateStr
                    })
                });

                let backtestResult = null;
                try {
                    backtestResult = await response.json();
                } catch (e) {
                    backtestResult = null;
                }

                if (!response.ok) {
                    const msg = backtestResult?.error || `请求失败：HTTP ${response.status}`;
                    const detail = backtestResult?.detail ? `\n${JSON.stringify(backtestResult.detail, null, 2)}` : '';
                    throw new Error(msg + detail);
                }
                console.log('回测结果：', backtestResult);

                // 7. 渲染结果
                renderResults(backtestResult);

                // 8. 显示结果，隐藏加载
                loadingSection.classList.add('hidden');
                resultSection.classList.remove('hidden');

            } catch (error) {
                loadingSection.classList.add('hidden');
                alert(`回测失败：${error.message}`);
                console.error('回测错误：', error);
            }
        });

        // ========== 渲染结果函数 ==========
        function renderResults(data) {
            // 1. 渲染组合价值走势图表
            renderPortfolioChart(data);

            // 2. 渲染收益/回撤对比图表
            renderReturnDrawdownChart(data);

            // 3. 渲染回测详情表格
            renderResultTable(data);

            // 4. 渲染最优策略交易明细
            renderTradeDetailTable(data);
        }

        // 渲染组合价值走势图表
        function renderPortfolioChart(data) {
            const chartDom = document.getElementById('portfolioChart');
            const myChart = echarts.init(chartDom);

            // 提取基准和所有策略的日期、价值数据
            const benchmark = data.benchmark;
            const strategies = data.strategies;

            // 假设portfolio_series是日期-价值的键值对（需后端返回结构化的日期和价值数组）
            // 此处为示例，需根据实际返回格式调整
            const dates = data.strategies[0].portfolio_series
                ? Object.keys(data.strategies[0].portfolio_series)
                : [];

            // 构造系列数据
            const series = [
                {
                    name: benchmark.strategy,
                    type: 'line',
                    data: benchmark.portfolio_series ? Object.values(benchmark.portfolio_series) : [],
                    lineStyle: { width: 2 },
                    itemStyle: { color: '#F53F3F' },
                    emphasis: { focus: 'series' }
                }
            ];

            // 添加各策略的价值曲线
            strategies.forEach(strategy => {
                series.push({
                    name: strategy.strategy,
                    type: 'line',
                    data: strategy.portfolio_series ? Object.values(strategy.portfolio_series) : [],
                    lineStyle: { width: 1.5 },
                    emphasis: { focus: 'series' }
                });
            });

            const option = {
                title: { text: '', left: 'center' },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        let res = params[0].name;
                        params.forEach(item => {
                            res += `<br/>${item.seriesName}：${Number(item.value).toLocaleString('zh-CN', { maximumFractionDigits: 0 })} 元`;
                        });
                        return res;
                    }
                },
                legend: {
                    top: 'top',
                    left: 'left',
                    orient: 'horizontal',
                    textStyle: { fontSize: 12 }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLabel: {
                        rotate: 45,
                        fontSize: 10
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '组合价值（元）',
                    axisLabel: {
                        formatter: (value) => value.toLocaleString('zh-CN')
                    }
                },
                series: series
            };

            myChart.setOption(option);
            // 自适应窗口大小
            window.addEventListener('resize', () => myChart.resize());
        }

        // 渲染收益/回撤对比图表
        function renderReturnDrawdownChart(data) {
            const chartDom = document.getElementById('returnDrawdownChart');
            const myChart = echarts.init(chartDom);

            const benchmark = data.benchmark;
            const strategies = data.strategies;

            // 提取策略名称、累计收益、最大回撤
            const strategyNames = [benchmark.strategy, ...strategies.map(s => s.strategy)];
            const totalReturns = [benchmark.total_return, ...strategies.map(s => s.total_return)];
            const maxDrawdowns = [benchmark.max_drawdown, ...strategies.map(s => s.max_drawdown)];

            const option = {
                title: { text: '', left: 'center' },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                legend: {
                    top: 'top',
                    left: 'left',
                    data: ['累计收益(%)', '最大回撤(%)'],
                    textStyle: { fontSize: 12 }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: strategyNames,
                    axisLabel: {
                        rotate: 45,
                        fontSize: 10
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '百分比（%）'
                },
                series: [
                    {
                        name: '累计收益(%)',
                        type: 'bar',
                        data: totalReturns,
                        itemStyle: { color: '#00B42A' },
                        label: {
                            show: true,
                            position: 'top',
                            fontSize: 10,
                            formatter: (value) => value + '%'
                        }
                    },
                    {
                        name: '最大回撤(%)',
                        type: 'bar',
                        data: maxDrawdowns,
                        itemStyle: { color: '#F53F3F' },
                        label: {
                            show: true,
                            position: 'bottom',
                            fontSize: 10,
                            formatter: (value) => value + '%'
                        }
                    }
                ]
            };

            myChart.setOption(option);
            window.addEventListener('resize', () => myChart.resize());
        }

        // 渲染回测详情表格
        function renderResultTable(data) {
            const tableBody = document.getElementById('resultTableBody');
            tableBody.innerHTML = '';

            // 先添加基准行
            const benchmark = data.benchmark;
            const benchmarkRow = `
                <tr class="hover:bg-gray-50">
                    <td class="border border-gray-200 px-4 py-2 text-sm">${benchmark.strategy}</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">${benchmark.total_return}</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">${benchmark.annual_return}</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">${benchmark.max_drawdown}</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">${benchmark.sharpe}</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">-</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">0</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">-</td>
                    <td class="border border-gray-200 px-4 py-2 text-sm text-right">-</td>
                </tr>
            `;
            tableBody.innerHTML += benchmarkRow;

            // 添加各策略行
            const strategies = data.strategies;
            strategies.forEach(strategy => {
                const excessReturn = (strategy.total_return - benchmark.total_return).toFixed(2);
                const row = `
                    <tr class="hover:bg-gray-50">
                        <td class="border border-gray-200 px-4 py-2 text-sm">${strategy.strategy}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right ${strategy.total_return > 0 ? 'text-success' : 'text-danger'}">${strategy.total_return}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right">${strategy.annual_return}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right text-danger">${strategy.max_drawdown}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right">${strategy.sharpe}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right">${strategy.win_rate}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right">${strategy.n_trades}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right">${strategy.profit_loss_ratio}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right ${excessReturn > 0 ? 'text-success' : 'text-danger'}">${excessReturn}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // 渲染最优策略交易明细
        function renderTradeDetailTable(data) {
            const tableBody = document.getElementById('tradeDetailTableBody');
            const bestStrategyTitle = document.getElementById('bestStrategyTitle');
            tableBody.innerHTML = '';

            // 获取最优策略信息
            const bestStrategyName = data.best_by_sharpe;
            const tradeDetails = data.trades_detail[bestStrategyName] || [];

            // 更新标题
            bestStrategyTitle.textContent = `最优策略【${bestStrategyName}】交易明细`;

            // 填充交易明细
            if (tradeDetails.length === 0) {
                const emptyRow = `
                    <tr>
                        <td colspan="6" class="border border-gray-200 px-4 py-2 text-sm text-center text-secondary">暂无交易记录</td>
                    </tr>
                `;
                tableBody.innerHTML = emptyRow;
                return;
            }

            tradeDetails.forEach((trade, index) => {
                const pnlClass = trade.pnl_pct > 0 ? 'text-success' : 'text-danger';
                const row = `
                    <tr class="hover:bg-gray-50">
                        <td class="border border-gray-200 px-4 py-2 text-sm">${index + 1}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm">${trade.entry_date}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm">${trade.exit_date}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right">${trade.entry_price}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right">${trade.exit_price}</td>
                        <td class="border border-gray-200 px-4 py-2 text-sm text-right ${pnlClass}">${trade.pnl_pct}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // ========== 页面初始化 ==========
        window.addEventListener('load', () => {
            // 初始化ECharts自适应
            window.addEventListener('resize', () => {
                const portfolioChart = echarts.getInstanceByDom(document.getElementById('portfolioChart'));
                const returnDrawdownChart = echarts.getInstanceByDom(document.getElementById('returnDrawdownChart'));
                if (portfolioChart) portfolioChart.resize();
