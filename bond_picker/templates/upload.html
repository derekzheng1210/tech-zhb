<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据上传 - 信用债择券辅助工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px;max-width:480px;width:100%;margin:20px}
h1{font-size:22px;color:#1e293b;margin-bottom:8px}
.desc{color:#64748b;font-size:14px;margin-bottom:24px}
.info{background:#f1f5f9;border-radius:8px;padding:12px 16px;margin-bottom:24px;font-size:13px;color:#475569}
.info span{font-weight:600;color:#1e293b}
.form-group{margin-bottom:16px}
label{display:block;font-size:14px;font-weight:500;color:#334155;margin-bottom:6px}
input[type="password"],input[type="file"]{width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#2563eb}
.btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#1d4ed8}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
.msg{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px}
.msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.msg.success{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.back{display:block;text-align:center;margin-top:20px;color:#64748b;font-size:13px;text-decoration:none}
.back:hover{color:#2563eb}
.spinner{display:none;width:20px;height:20px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-content{display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="card">
  <h1>📤 更新债券数据</h1>
  <p class="desc">上传新的 Excel 数据文件，网站数据将即时刷新。</p>

  <div class="info">
    当前状态：<span>{{ total }}</span> 条债券<br>
    数据时间：<span>{{ timestamp }}</span>
  </div>

  {% if error %}
  <div class="msg error">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="msg success">{{ success }}</div>
  {% endif %}

  <form method="POST" enctype="multipart/form-data" onsubmit="onSubmit()">
    <div class="form-group">
      <label>管理密码</label>
      <input type="password" name="password" placeholder="请输入上传密码" required>
    </div>
    <div class="form-group">
      <label>选择 Excel 文件（.xlsx）</label>
      <input type="file" name="excel" accept=".xlsx,.xls" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">
      <span class="btn-content">
        <span class="spinner" id="spinner"></span>
        上传并刷新
      </span>
    </button>
  </form>

  <a href="/" class="back">← 返回主页面</a>
</div>

<script>
function onSubmit(){
  document.getElementById('spinner').style.display='block';
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
}
</script>
</body>
</html>
